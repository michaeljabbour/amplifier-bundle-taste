# behaviors/output-discipline.yaml
#
# Always-on output completeness enforcement.
# Injects the output-discipline skill into every session that mounts this behavior.

bundle:
  name: output-discipline-behavior
  version: 0.1.0
  description: >-
    Always-on output completeness enforcement — injects the output-discipline
    skill into every session that mounts this behavior. Bans `// ...` placeholders,
    "for brevity" hedges, structural elision, and defines a clean pause/resume
    protocol for token-limited outputs. Mount on every Amplifier session that
    produces code, not just frontend ones.

context:
  include:
    - taste:context/instructions.md
    - taste:skills/output-discipline.md
