# recipes/redesign-audit.yaml
#
# Audit-then-fix workflow for upgrading an existing frontend project's
# design quality. Three stages with a mandatory approval gate between
# audit and fix so the user reviews the plan before any code changes.
#
# Workflow:
#   Stage 1 — scan:    Read codebase, identify framework/styling baseline,
#              write .amplifier/redesign/baseline.md.
#   Stage 2 — diagnose: Apply ban list + dial thresholds against all files in
#              target_path, write .amplifier/redesign/audit.md with Critical /
#              Warning / Suggestion tiers and a Fix Priority section.
#   Approval gate: user reviews audit.md, scopes the fix, and confirms the
#              Fix Priority order before any code is touched.
#   Stage 3 — fix:     Apply fixes per priority order, write fix-report.md.
#
# Dependencies (not enforced by the recipe engine — document here for ops):
#   bundle: taste  (design-critic and component-designer agents,
#                   redesign-existing-projects skill, context files)
#   skills used: taste:redesign-existing-projects, taste:output-discipline

name: "redesign-audit"
description: |
  Audit an existing frontend codebase against the taste bundle's ban list
  and parametric dial thresholds, then apply targeted fixes after user
  approval. Does NOT migrate frameworks. Designed for upgrading existing
  projects in place.

context:
  target_path: "src"
  archetype: ""
  scope: "all"   # one of: "critical" | "critical_warning" | "all" — set by approval gate or user input

steps:
  - id: "scan"
    description: "Read codebase and identify framework/styling/design baseline"
    agent: "taste:design-critic"
    prompt_template: |
      You are scanning {{target_path}} for a redesign. Phase 1 (Scan) of
      @taste:skills/redesign-existing-projects.md.

      Read in this order:
      1. package.json (identify React/Vue/Svelte/Next/etc.)
      2. Tailwind/styled-components config (identify styling baseline)
      3. globals.css or root stylesheet (identify CSS variables, base typography)
      4. 3 representative components from {{target_path}} (one hero, one form,
         one data display)
      5. The root layout if it exists (app/layout.tsx, src/App.vue, etc.)

      Produce a "design baseline report" at .amplifier/redesign/baseline.md
      describing the current state — framework, styling method, typography
      baseline, color palette in use, identified component patterns.
    outputs:
      - baseline_path

  - id: "diagnose"
    description: "Audit against ban list and produce structured violation report"
    agent: "taste:design-critic"
    inputs:
      baseline_path: "{{steps.scan.outputs.baseline_path}}"
    prompt_template: |
      You have the baseline report at {{baseline_path}}. Now run Phase 2
      (Diagnose) of @taste:skills/redesign-existing-projects.md.

      Apply the full ban list from @taste:context/ai-tells-design.md to all
      files in {{target_path}}. Apply dial threshold checks from
      @taste:context/dials.md. If {{archetype}} is set, also apply that
      archetype's specific rules from @taste:skills/{{archetype}}-taste.md.

      Output a structured violation report at .amplifier/redesign/audit.md
      with the format from your agent persona — Critical / Warning /
      Suggestion tiers, file:line citations, source-rule citations.

      ALSO output a Fix Priority section at the end with the recommended
      order to apply fixes (max impact / min risk first).
    outputs:
      - audit_path

  - id: "approval-before-fix"
    type: "approval"
    description: "User reviews audit before fixes are applied"
    prompt: |
      Audit complete. Review {{steps.diagnose.outputs.audit_path}} for:
      - Are the violations real, or does your project intentionally allow some?
      - Is the Fix Priority order acceptable?
      - Reply with the desired scope:
        - `critical` — fix only Critical violations
        - `critical_warning` — fix Critical and Warning
        - `all` — fix everything (Critical, Warning, Suggestion)
      Approve to apply fixes (with the chosen scope), deny to revise the audit.
    outputs:
      scope: "{{_approval_message}}"   # capture user reply as scope override

  - id: "fix"
    description: "Apply fixes per the audit's Fix Priority order, scoped per user input"
    agent: "taste:component-designer"
    inputs:
      audit_path: "{{steps.diagnose.outputs.audit_path}}"
      scope: "{{steps.approval-before-fix.outputs.scope | default(context.scope)}}"
    prompt_template: |
      Apply fixes from {{audit_path}}, SCOPED to severity tier per user choice:

      - If scope = "critical": Fix ONLY Critical violations. Skip Warning and Suggestion.
      - If scope = "critical_warning": Fix Critical and Warning. Skip Suggestion.
      - If scope = "all": Fix everything (Critical → Warning → Suggestion in order).

      Active scope: {{scope}}

      For each in-scope violation:
      1. Edit the cited file:line
      2. Verify the fix doesn't break adjacent code
      3. If a fix requires multi-file changes (e.g., palette token swap), apply the full set
      4. After all in-scope violations are fixed, generate fix-report.md noting what was changed AND what was skipped (with severity).

      Output discipline: NO `// ...` placeholders. Every fix is complete before moving to the next.
    outputs:
      - fix_report_path
